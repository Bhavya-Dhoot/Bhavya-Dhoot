<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 66" role="img" aria-label="Toolkit">
  <style>
    :root { --ink:#141414; --muted:#7a7873; --line:#e4e2dd; }
    @media (prefers-color-scheme: dark) { :root { --ink:#ededed; --muted:#8f8d87; --line:#2b2b2b; } }
    .ink{fill:var(--ink);} .muted{fill:var(--muted);} .line{stroke:var(--line);}
    .serif{font-family:Georgia,'Times New Roman',serif;}
    .mono{font-family:'SFMono-Regular','SF Mono',Consolas,'Liberation Mono',monospace;}
  </style>
  <text x="60"  y="42" class="serif muted" font-size="26">03</text>
  <text x="104" y="40" class="mono ink" font-size="13.5" letter-spacing="4">TOOLKIT</text>
  <line x1="60" y1="54" x2="1140" y2="54" class="line" stroke-width="1"/>
</svg>
