<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Bhavya Dhoot — AI Systems Engineer and Quant Researcher">
  <style>
    :root { --ink:#141414; --muted:#7a7873; --line:#e4e2dd; }
    @media (prefers-color-scheme: dark) {
      :root { --ink:#ededed; --muted:#8f8d87; --line:#2b2b2b; }
    }
    .ink   { fill: var(--ink); }
    .muted { fill: var(--muted); }
    .line  { stroke: var(--line); }
    .strokeInk { stroke: var(--ink); }
    .serif { font-family: Georgia, 'Times New Roman', serif; }
    .mono  { font-family: 'SFMono-Regular','SF Mono',Consolas,'Liberation Mono',monospace; }
  </style>

  <!-- document frame -->
  <line x1="60" y1="46"  x2="1140" y2="46"  class="line" stroke-width="1"/>
  <line x1="60" y1="256" x2="1140" y2="256" class="line" stroke-width="1"/>

  <!-- kicker -->
  <text x="60" y="84" class="mono muted" font-size="13" letter-spacing="3.5">PORTFOLIO / AI · QUANT · SYSTEMS</text>

  <!-- wordmark -->
  <text x="58" y="162" class="serif ink" font-size="76" letter-spacing="-1.5">Bhavya Dhoot</text>
  <text x="61" y="196" class="mono muted" font-size="15" letter-spacing="0.4">AI Systems Engineer · Quant Researcher</text>

  <!-- signal graphic -->
  <g>
    <!-- baseline -->
    <line x1="690" y1="212" x2="1120" y2="212" class="line" stroke-width="1" stroke-opacity="0.7"/>
    <!-- now boundary -->
    <line x1="1028" y1="104" x2="1028" y2="204" class="line" stroke-width="1" stroke-dasharray="2 5"/>

    <!-- history (solid) -->
    <polyline points="690,178 716,170 742,182 768,160 794,168 820,150 846,158 872,140 898,150 924,132 950,142 976,120 1002,130 1028,108"
              fill="none" class="strokeInk" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- forecast (dashed) -->
    <polyline points="1028,108 1060,102 1092,96 1120,90"
              fill="none" class="strokeInk" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="3 4" stroke-linecap="round"/>

    <!-- live dot + pulse -->
    <circle cx="1028" cy="108" r="9" class="ink" opacity="0.14">
      <animate attributeName="r" values="4;15;4" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0;0.22" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1028" cy="108" r="4" class="ink"/>

    <!-- micro-labels -->
    <text x="1028" y="230" class="mono muted" font-size="10.5" letter-spacing="2" text-anchor="middle">NOW</text>
    <text x="1120" y="80"  class="mono muted" font-size="10.5" letter-spacing="2" text-anchor="end">FORECAST</text>
  </g>

  <!-- bottom meta -->
  <text x="60"   y="282" class="mono muted" font-size="12.5" letter-spacing="1.5">Dubai, UAE</text>
  <text x="1140" y="282" class="mono muted" font-size="12.5" letter-spacing="1.5" text-anchor="end">github.com/Bhavya-Dhoot</text>
</svg>
