<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" role="img" aria-label="Outcomes: 7+ systems live, sub-340ms signal latency, 66% API cost cut, 88% RAG retrieval, 96.1% model accuracy, 24.7M parameters fine-tuned">
  <style>
    :root { --ink:#141414; --muted:#7a7873; --line:#e4e2dd; }
    @media (prefers-color-scheme: dark) { :root { --ink:#ededed; --muted:#8f8d87; --line:#2b2b2b; } }
    .ink{fill:var(--ink);} .muted{fill:var(--muted);} .line{stroke:var(--line);}
    .serif{font-family:Georgia,'Times New Roman',serif;}
    .mono{font-family:'SFMono-Regular','SF Mono',Consolas,'Liberation Mono',monospace;}
  </style>

  <line x1="60" y1="28"  x2="1140" y2="28"  class="line" stroke-width="1"/>
  <line x1="60" y1="126" x2="1140" y2="126" class="line" stroke-width="1"/>

  <g class="line" stroke-width="1" stroke-opacity="0.7">
    <line x1="240" y1="46" x2="240" y2="108"/>
    <line x1="420" y1="46" x2="420" y2="108"/>
    <line x1="600" y1="46" x2="600" y2="108"/>
    <line x1="780" y1="46" x2="780" y2="108"/>
    <line x1="960" y1="46" x2="960" y2="108"/>
  </g>

  <g text-anchor="middle">
    <text x="150"  y="84" class="serif ink" font-size="34">7+</text>
    <text x="330"  y="84" class="serif ink" font-size="34">&lt;340ms</text>
    <text x="510"  y="84" class="serif ink" font-size="34">66%</text>
    <text x="690"  y="84" class="serif ink" font-size="34">88%</text>
    <text x="870"  y="84" class="serif ink" font-size="34">96.1%</text>
    <text x="1050" y="84" class="serif ink" font-size="34">24.7M</text>

    <text x="150"  y="107" class="mono muted" font-size="10.5" letter-spacing="2">SYSTEMS LIVE</text>
    <text x="330"  y="107" class="mono muted" font-size="10.5" letter-spacing="2">SIGNAL LATENCY</text>
    <text x="510"  y="107" class="mono muted" font-size="10.5" letter-spacing="2">API COST CUT</text>
    <text x="690"  y="107" class="mono muted" font-size="10.5" letter-spacing="2">RAG RETRIEVAL</text>
    <text x="870"  y="107" class="mono muted" font-size="10.5" letter-spacing="2">MODEL ACCURACY</text>
    <text x="1050" y="107" class="mono muted" font-size="10.5" letter-spacing="2">PARAMS TUNED</text>
  </g>
</svg>
